name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip source project
        run: |
          rm -rf kasse
          unzip -q kasse-source.zip

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install frontend dependencies
        working-directory: kasse/frontend
        run: |
          rm -f package-lock.json
          npm install --include=dev --registry=https://registry.npmjs.org/
          npx vite --version

      - name: Build web app
        working-directory: kasse/frontend
        run: npm run build

      - name: Sync Capacitor Android
        working-directory: kasse/frontend
        run: npx cap sync android

      - name: Make Gradle executable
        working-directory: kasse/frontend/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: kasse/frontend/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kasse-debug-apk
          path: kasse/frontend/android/app/build/outputs/apk/debug/app-debug.apk
